<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameVault — Official Game Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050810;
  --card:#111827;
  --accent:#00f5ff;
  --accent2:#7c3aed;
  --text:#e2e8f0;
  --muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(5,8,16,0.95);
  backdrop-filter:blur(10px);
}
.logo{
  font-family:'Orbitron',monospace;
  font-size:22px;
  font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.search-bar{
  background:#0d1117;
  border:1px solid rgba(255,255,255,0.1);
  padding:8px 15px;
  border-radius:6px;
  width:280px;
}
.search-bar input{
  background:none;border:none;outline:none;color:white;width:100%;font-family:'Rajdhani',sans-serif;font-size:15px;
}
.hero{
  text-align:center;
  padding:50px 20px 30px;
}
.hero h1{
  font-family:'Orbitron',monospace;
  font-size:clamp(28px,5vw,48px);
  background:linear-gradient(135deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero p{
  color:var(--muted);
  margin-top:10px;
  font-size:16px;
  letter-spacing:1px;
}
.hero-count{
  margin-top:8px;
  font-size:13px;
  color:var(--accent);
  letter-spacing:2px;
}
.filters{
  padding:20px 40px 0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.filters-label{
  color:var(--muted);
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-right:4px;
}
.filter-btn{
  padding:7px 15px;
  border:1px solid rgba(255,255,255,0.1);
  background:none;
  color:var(--muted);
  cursor:pointer;
  border-radius:5px;
  font-family:'Rajdhani',sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:1px;
  transition:0.2s;
}
.filter-btn.active,
.filter-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:rgba(0,245,255,0.05);
}
.filter-btn[data-src="fitgirl"].active{ border-color:#00f5ff; color:#00f5ff; }
.filter-btn[data-src="dodi"].active{ border-color:#ff006e; color:#ff006e; border-color:#ff006e; }
.filter-btn[data-src="elamigos"].active{ border-color:#7c3aed; color:#7c3aed; }
.filter-btn[data-src="gog"].active{ border-color:#f59e0b; color:#f59e0b; }
.filter-btn[data-src="steam"].active{ border-color:#1e90ff; color:#1e90ff; }

.genre-filters{
  padding:12px 40px 20px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.genre-btn{
  padding:4px 12px;
  border:1px solid rgba(255,255,255,0.07);
  background:none;
  color:var(--muted);
  cursor:pointer;
  border-radius:20px;
  font-family:'Rajdhani',sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:1px;
  transition:0.2s;
}
.genre-btn.active,
.genre-btn:hover{
  border-color:var(--accent2);
  color:var(--accent2);
  background:rgba(124,58,237,0.08);
}

.grid{
  padding:10px 40px 60px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}
.card{
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  transition:transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  display:flex;
  flex-direction:column;
}
.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
  box-shadow:0 10px 30px rgba(0,245,255,0.12);
}

/* Clickable image */
.card-img-wrap{
  display:block;
  overflow:hidden;
  position:relative;
}
.card-img-wrap img{
  width:100%;
  height:160px;
  object-fit:cover;
  transition:transform 0.4s;
  display:block;
}
.card:hover .card-img-wrap img{
  transform:scale(1.06);
}
.img-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.3s;
}
.card:hover .img-overlay{
  background:rgba(0,0,0,0.35);
}
.img-overlay span{
  opacity:0;
  font-size:13px;
  font-weight:700;
  letter-spacing:2px;
  color:#fff;
  background:var(--accent);
  color:#000;
  padding:5px 14px;
  border-radius:4px;
  transition:opacity 0.3s;
  text-transform:uppercase;
  font-family:'Rajdhani',sans-serif;
}
.card:hover .img-overlay span{
  opacity:1;
}

.src-badge{
  position:absolute;
  top:8px;
  left:8px;
  padding:2px 8px;
  font-size:10px;
  font-weight:700;
  letter-spacing:1px;
  border-radius:3px;
  text-transform:uppercase;
}
.card-body{
  padding:13px 15px;
  flex:1;
  display:flex;
  flex-direction:column;
}
.card-title{
  font-size:16px;
  font-weight:600;
  color:#fff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.card-meta{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
  display:flex;
  justify-content:space-between;
}
.card-size{
  color:var(--accent);
  font-weight:600;
}
.btn{
  margin-top:10px;
  padding:8px;
  text-align:center;
  background:transparent;
  border:1px solid var(--accent);
  color:var(--accent);
  text-decoration:none;
  border-radius:5px;
  font-weight:700;
  font-family:'Rajdhani',sans-serif;
  font-size:13px;
  letter-spacing:1px;
  transition:0.2s;
}
.btn:hover{
  background:var(--accent);
  color:#000;
}

.no-results{
  grid-column:1/-1;
  text-align:center;
  padding:60px;
  color:var(--muted);
  font-size:18px;
  letter-spacing:2px;
}

footer{
  text-align:center;
  padding:20px;
  border-top:1px solid rgba(255,255,255,0.08);
  color:var(--muted);
  font-size:13px;
  line-height:1.8;
}
footer a{color:var(--accent);text-decoration:none}

@media(max-width:768px){
  header{flex-direction:column;gap:15px;padding:15px 20px}
  .grid{padding:10px 15px 40px}
  .filters,.genre-filters{padding-left:15px;padding-right:15px}
  .search-bar{width:100%}
}
</style>
</head>
<body>

<header>

</header>

<!-- Source Filters -->
<div class="filters">

  <button class="filter-btn" data-src="steam" onclick="setSource('steam',this)" style="border-color:rgba(30,144,255,0.2)">Steam</button>
</div>

<!-- Genre Filters -->
<div class="genre-filters">
  <span class="filters-label" style="font-size:12px;letter-spacing:2px;color:var(--muted);align-self:center">Genre:</span>
  <button class="genre-btn active" onclick="setGenre('all',this)">All</button>
  <button class="genre-btn" onclick="setGenre('action',this)">Action</button>
  <button class="genre-btn" onclick="setGenre('rpg',this)">RPG</button>
  <button class="genre-btn" onclick="setGenre('shooter',this)">Shooter</button>
  <button class="genre-btn" onclick="setGenre('strategy',this)">Strategy</button>
  <button class="genre-btn" onclick="setGenre('sport',this)">Sports</button>
  <button class="genre-btn" onclick="setGenre('adventure',this)">Adventure</button>
  <button class="genre-btn" onclick="setGenre('horror',this)">Horror</button>
  <button class="genre-btn" onclick="setGenre('simulation',this)">Simulation</button>
  <button class="genre-btn" onclick="setGenre('fighting',this)">Fighting</button>
</div>

<div class="grid" id="gameGrid"></div>

<footer>
  GameVault links only to official repack & store pages. No files are hosted here.<br>

  <a href="https://gog-games.to" target="_blank">gog-games.to</a>
</footer>

let currentSource = "all";
let currentGenre = "all";

function setSource(source, btn){
  currentSource = source;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function setGenre(genre, btn){
  currentGenre = genre;
  document.querySelectorAll(".genre-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function render(){
  const grid = document.getElementById("gameGrid");
  const search = document.getElementById("search").value.toLowerCase();

  const filtered = games.filter(g=>{
    const matchSource = currentSource==="all" || g.source===currentSource;
    const matchGenre  = currentGenre==="all"  || g.genre===currentGenre;
    const matchSearch = g.title.toLowerCase().includes(search) || g.genre.includes(search) || g.source.includes(search);
    return matchSource && matchGenre && matchSearch;
  });

  document.getElementById("heroCount").textContent = `${filtered.length} GAMES FOUND`;

  if(filtered.length === 0){
    grid.innerHTML = `<div class="no-results">⊘ No games match your search</div>`;
    return;
  }

  grid.innerHTML = filtered.map(g=>{
    const src = SRC[g.source];
    return `
    <div class="card">
      <a class="card-img-wrap" href="${g.link}" target="_blank" rel="noopener noreferrer">
        <img src="${g.image}" alt="${g.title}" loading="lazy"
          onerror="this.src='https://placehold.co/460x215/111827/00f5ff?text=${encodeURIComponent(g.title)}'">
        <div class="img-overlay"><span>Go to Page ↗</span></div>
        <div class="src-badge" style="background:${src.bg};color:${src.color}">${src.label}</div>
      </a>
      <div class="card-body">
        <div class="card-title">${g.title}</div>
        <div class="card-meta">
          <span>${g.genre.toUpperCase()}</span>
          <span class="card-size">⬇ ${g.size}</span>
        </div>
        <a class="btn" href="${g.link}" target="_blank" rel="noopener noreferrer">Visit Page</a>
      </div>
    </div>`;
  }).join("");
}

render();
</script>
